<!DOCTYPE html>
<html style="touch-action: none;">
	<head>
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
		<title></title>
		<link rel="stylesheet" href="../../css/normalize.css">
		<link rel="stylesheet" href="../../css/animate.min.css">
		<link rel="stylesheet" href="../../css/swiper.min.css">
		<link rel="stylesheet" href="../../css/liMarquee.css">
		<link rel="stylesheet" href="../../css/base.css">	
		<link rel="stylesheet" href="../../css/style.css">	
		<style>
			body{background: rgba(0,0,0,0);width: 1800px;height: 860px;}						
		</style>
	</head>
	<body class="animated fadeIn" oncontextmenu="return false" onselectstart="return false" ondragstart="return false;" ondragend="return false;" onbeforecopy="return false" oncopy="document.selection.empty()" onselect="document.selection.empty()">		
			<div class="panel">
				<div class="swiper-container">
					<div class="swiper-wrapper">
						<div class="swiper-slide">
							<img src="../../files/1/3千兆小区/上湾/滨河佳苑.jpg">
							<div class="p-box">
								<p>上湾滨河佳苑小区：位于滨河大道附近，可提供客户接入端口共计472个。</p>
							</div>
						</div>
						<div class="swiper-slide">
							<img src="../../files/1/3千兆小区/上湾/和谐小区.jpg">
							<div class="p-box">
								<p>上湾和谐小区：位于阿大公路附近，可提供客户接入端口共计784个。</p>
							</div>
						</div>
						<div class="swiper-slide">
							<img src="../../files/1/3千兆小区/上湾/金水湾.jpg">
							<div class="p-box">
								<p>上湾金水湾小区：位于乌兰木伦镇附近，可提供客户接入端口共计324个。</p>
							</div>
						</div>
						<div class="swiper-slide">
							<img src="../../files/1/3千兆小区/上湾/民泰小区.jpg">
							<div class="p-box">
								<p>上湾民泰小区：位于小大线附近，可提供客户接入端口共计860个。</p>
							</div>
						</div>						
					</div>
				</div>
				<div class="table-box">
					<table class="table">
						<thead>
							<tr>
								<th style="width: 80%;">小区名称</th>
								<th >可接入用户</th>
							</tr>						
						</thead>
					</table>
					<div class="scroll">
						<table class="table gudong">
							<tbody>
								<tr>
									
								</tr>
								
							</tbody>
						</table>
					</div>					
				</div>				
			</div>	

		<script src="../../js/jquery-1.11.3.min.js"></script>
		<script src="../../js/jquery.liMarquee.js"></script>
		<script src="../../js/swiper.min.js"></script>
		<script src="../../js/swiperEx.js"></script>
		<script src="../../js/data.json"></script>
		<script>
			$(document).ready(function() {
				createSwiper('.swiper-container', 8000, 300, true);
				var rows = [];
				$.each(data.shangwan,function(i,item){
					rows.push('<tr><td>'+item.name+'</td><td>'+item.number+'</td></tr>')
				})
				$('.gudong tbody').empty().append(rows.join(''));
				$('.scroll').liMarquee({
					direction: "up",
					scrollamount: 50,
					runshort:false,
					circular:false
				})
			});		
		</script>
	</body>
</html>
